apiVersion: v1
kind: Pod
metadata:
  name: bad-privileged-pod
  namespace: policy-demo
spec:
  containers:
    - name: bad
      image: ghcr.io/yuvalpinto/secubernetes-demo:latest
      command: ["sh", "-c", "sleep 3600"]
      securityContext:
        privileged: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
