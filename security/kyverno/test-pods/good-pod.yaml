apiVersion: v1
kind: Pod
metadata:
  name: good-policy-demo-pod
  namespace: policy-demo
spec:
  containers:
    - name: app
      image: ghcr.io/yuvalpinto/secubernetes-demo:latest
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
      securityContext:
        privileged: false
