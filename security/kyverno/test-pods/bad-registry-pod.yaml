apiVersion: v1
kind: Pod
metadata:
  name: bad-registry-pod
  namespace: policy-demo
spec:
  containers:
    - name: bad
      image: nginx:latest
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
      securityContext:
        privileged: false
