apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: secubernetes-require-resource-limits
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-container-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - policy-demo
      validate:
        message: "CPU and memory requests/limits are required by Secubernetes admission policy."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
